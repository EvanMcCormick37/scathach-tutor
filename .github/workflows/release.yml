name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            pyinstaller_platform: windows
          - os: macos-latest
            target: x86_64-apple-darwin
            pyinstaller_platform: darwin-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            pyinstaller_platform: darwin-aarch64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            pyinstaller_platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # ── Python / PyInstaller ──────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install pyinstaller ".[api]" --extra-index-url https://pypi.org/simple

      - name: Build scathach-server binary (PyInstaller)
        run: |
          pyinstaller \
            --onefile \
            --name scathach-server \
            --collect-all docling \
            scathach/api/server_entry.py

      - name: Stage sidecar binary for Tauri
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          EXT=""
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then EXT=".exe"; fi
          cp dist/scathach-server${EXT} src-tauri/binaries/scathach-server-${{ matrix.target }}${EXT}

      # ── Node / Vite ───────────────────────────────────────────────────────
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package.json

      - name: Install Node dependencies
        run: npm install
        working-directory: ui

      - name: Build React frontend
        run: npm run build
        working-directory: ui

      # ── Rust / Tauri ──────────────────────────────────────────────────────
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "scathach ${{ github.ref_name }}"
          releaseBody: "See CHANGELOG for details."
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
